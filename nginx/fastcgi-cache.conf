# FastCGI page cache - http context (cargado desde conf.d)

fastcgi_cache_path /var/cache/nginx/wordpress
    levels=1:2
    keys_zone=WORDPRESS:100m
    max_size=512m
    inactive=60m
    use_temp_path=off;

fastcgi_cache_key "$scheme$request_method$host$request_uri";

# Evita stampede cuando varios clientes piden la misma URL miss
fastcgi_cache_lock         on;
fastcgi_cache_lock_timeout 5s;

# Sirve stale si el backend falla / se actualiza
fastcgi_cache_use_stale       error timeout invalid_header updating http_500 http_502 http_503 http_504;
fastcgi_cache_background_update on;

# Solo cacheamos GET/HEAD
fastcgi_cache_methods GET HEAD;

# IMPORTANTE: opt-in puro.
# Sin fastcgi_ignore_headers, nginx respeta Cache-Control / Expires / Set-Cookie de WP.
# valid=0s en 200/301/302 -> si la respuesta no trae Cache-Control con max-age,
# NO se cachea. Si WP manda "Cache-Control: max-age=N", se cachea N segundos.
fastcgi_cache_valid 200 301 302 0s;
fastcgi_cache_valid 404 1m;
