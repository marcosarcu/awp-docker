set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

server {
    listen 8080 default_server;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    client_max_body_size 128M;
    server_tokens off;

    # ---- FastCGI page cache: decision de bypass ----
    set $skip_cache 0;

    if ($request_method = POST)               { set $skip_cache 1; }
    if ($query_string != "")                  { set $skip_cache 1; }
    if ($request_uri ~* "/(wp-admin/|wp-login\.php|wp-cron\.php|xmlrpc\.php|wp-json/)") { set $skip_cache 1; }
    if ($request_uri ~* "/(feed/|comments/feed/|sitemap.*\.xml)") { set $skip_cache 1; }
    if ($request_uri ~* "preview=true")       { set $skip_cache 1; }

    # Usuarios logueados / commenters / posts protegidos
    if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wp-postpass|wordpress_logged_in|wordpress_no_cache|woocommerce_items_in_cart|woocommerce_cart_hash|wp_woocommerce_session_") { set $skip_cache 1; }

    # Header de debug: HIT / MISS / BYPASS / EXPIRED / STALE
    add_header X-FastCGI-Cache $upstream_cache_status always;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # Purga via nginx-helper: GET /purge/<uri-original>
    # Restringido a redes internas (proxy de Coolify + red docker)
    location ~ ^/purge(/.*) {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        fastcgi_cache_purge WORDPRESS "$scheme$request_method$host$1";
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;

        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache     $skip_cache;
        fastcgi_cache        WORDPRESS;
    }

    # BEGIN CompressX
    set $ext_avif ".avif";
    if ($http_accept !~* "image/avif") {
        set $ext_avif "";
    }

    set $ext_webp ".webp";
    if ($http_accept !~* "image/webp") {
        set $ext_webp "";
    }

    # Servir imágenes optimizadas si existen
    location ~ /wp-content/(?<cx_path>.+)\.(?<cx_ext>jpe?g|png|gif|webp)$ {
        expires 30d;
        access_log off;
        add_header Vary Accept;
        add_header Cache-Control "public, immutable";

        try_files
            /wp-content/compressx-nextgen/$cx_path.$cx_ext$ext_avif
            /wp-content/compressx-nextgen/$cx_path.$cx_ext$ext_webp
            $uri
            =404;
    }
    # END CompressX

    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|avif|svg|ico|woff2?|ttf|eot|mp4|webm)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\.ht                          { deny all; }
    location ~ /\.git                         { deny all; }
    location ~ ^/\.user\.ini                  { deny all; }
    location ~ /\.(env|svn|hg|bzr|DS_Store|idea|vscode)(/|$) { deny all; }
    location = /wp-config.php                 { deny all; }
    location = /wp-config-sample.php          { deny all; }
    location = /xmlrpc.php                    { deny all; }
    location = /readme.html                   { deny all; }
    location = /license.txt                   { deny all; }
    location ~* /(?:uploads|files)/.*\.php$   { deny all; }

    # Logs de WP/PHP (debug.log, error_log, etc.)
    location ~* /wp-content/.*\.log$          { deny all; }
    location ~* /wp-content/debug\.log$       { deny all; }
    location ~* ^/error_log$                  { deny all; }

    # Backups y volcados (excepto /wp-content/uploads/)
    location ~* ^(?!/wp-content/uploads/).*\.(bak|backup|old|orig|save|swp|swo|sql|sql\.gz|tar|tar\.gz|tgz|zip|7z)$ { deny all; }

    # Metadatos de composer / npm / ruby
    location ~ ^/(composer\.(json|lock)|package(-lock)?\.json|yarn\.lock|Gemfile(\.lock)?)$ { deny all; }
}
